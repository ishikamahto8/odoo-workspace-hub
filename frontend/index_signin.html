<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | SkyHigh HRMS</title>
    <link rel="stylesheet" href="style_signin.css">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-brand" aria-label="SkyHigh HRMS">
            <div class="brand-mark">SH</div>
            <h1>SkyHigh HRMS</h1>
            <p>Secure people operations for attendance, payroll, leave, and employee records.</p>
        </section>

        <section class="auth-panel">
            <div class="auth-card">
                <div class="auth-heading">
                    <p class="eyebrow">Welcome back</p>
                    <h2>Sign in</h2>
                </div>

                <div class="alert error-alert" id="signinError" role="alert" hidden>
                    Incorrect email or password. Try hr@skyhigh.test or employee@skyhigh.test with password123.
                </div>

                <form id="signinForm" novalidate>
                    <div class="field">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" autocomplete="email" placeholder="name@company.com" required>
                        <small class="field-error">Enter a valid email address.</small>
                    </div>

                    <div class="field">
                        <label for="password">Password</label>
                        <div class="password-row">
                            <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Password" required>
                            <button class="icon-btn" type="button" id="togglePassword" aria-label="Show password">Show</button>
                        </div>
                        <small class="field-error">Password is required.</small>
                    </div>

                    <button class="primary-btn" type="submit">Sign in</button>
                </form>

                <p class="switch-copy">New employee? <a href="index_signup.html">Create an account</a></p>
            </div>
        </section>
    </main>

    <script src="script_signin.js"></script>
</body>
</html>
