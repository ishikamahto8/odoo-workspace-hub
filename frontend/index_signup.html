<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SkyHigh HRMS</title>
    <link rel="stylesheet" href="style_signup.css">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-brand" aria-label="SkyHigh HRMS">
            <div class="brand-mark">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 2a1 1 0 0 0-1 1v18H3a1 1 0 0 0 0 2h18a1 1 0 0 0 0-2h-2V3a1 1 0 0 0-1-1H6zm2 4h2v2H8V6zm4 0h2v2h-2V6zM8 10h2v2H8v-2zm4 0h2v2h-2v-2zM8 14h2v2H8v-2zm4 0h2v2h-2v-2zm-3 5h4v2H9v-2z" />
                </svg>
            </div>
            <h1>SkyHigh Management Portal</h1>
            <p>Streamlined management. Sky-high efficiency.</p>
        </section>

        <section class="auth-panel">
            <div class="auth-card">
                <div class="auth-heading">
                    <p class="eyebrow">Account setup</p>
                    <h2>Sign up</h2>
                </div>

                <div class="alert success-alert" id="signupSuccess" role="status" hidden>
                    Account created. Redirecting to your dashboard.
                </div>

                <form id="signupForm" novalidate>
                    <div class="field">
                        <label for="employeeId">Employee ID</label>
                        <input type="text" id="employeeId" name="employeeId" autocomplete="off" placeholder="EMP-1042" required>
                        <small class="field-error">Employee ID is required.</small>
                    </div>

                    <div class="field">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" autocomplete="email" placeholder="name@company.com" required>
                        <small class="field-error">Enter a valid email address.</small>
                    </div>

                    <div class="field">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" placeholder="Minimum 8 characters" required>
                        <small class="field-error">Use at least 8 characters.</small>
                    </div>

                    <div class="field">
                        <label for="role">Role</label>
                        <select id="role" name="role" required>
                            <option value="employee">Employee</option>
                            <option value="hr">HR Officer</option>
                        </select>
                    </div>

                    <button class="primary-btn" type="submit">Create account</button>
                </form>

                <p class="switch-copy">Already registered? <a href="index_signin.html">Sign in</a></p>
            </div>
        </section>
    </main>

    <script src="script_signup.js"></script>
</body>
</html>
