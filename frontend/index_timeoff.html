<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time-Off | SkyHigh HRMS</title>
    <link rel="stylesheet" href="style_timeoff.css">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <a class="brand" href="#" id="dashboardLink"><span class="brand-mark">SH</span><span>SkyHigh HRMS</span></a>
        <nav class="side-nav">
            <a href="#" id="navDashboard">Dashboard</a>
            <a href="index_profile.html">Profile</a>
            <a href="index_attendance.html">Attendance</a>
            <a class="active" href="index_timeoff.html">Time-Off</a>
            <a href="index_payroll.html">Payroll</a>
        </nav>
        <div class="role-card"><span class="role-pill" id="roleLabel">Employee</span><strong id="userName">Employee</strong><button class="ghost-btn" type="button" id="logoutBtn">Logout</button></div>
    </aside>
    <div class="app-shell">
        <header class="topbar"><button class="menu-btn" type="button" id="menuBtn">Menu</button><div><p class="eyebrow">Time-Off</p><h1>Leave requests</h1></div></header>
        <main class="content module-grid">
            <section class="panel">
                <p class="eyebrow">Apply</p>
                <h2>Request leave</h2>
                <form id="leaveForm" class="stack-form">
                    <label>Leave type<select id="leaveType" required><option>Paid</option><option>Sick</option><option>Unpaid</option></select></label>
                    <label>Start date<input type="date" id="startDate" required></label>
                    <label>End date<input type="date" id="endDate" required></label>
                    <label>Reason<textarea id="reason" rows="4" required></textarea></label>
                    <button class="primary-btn" type="submit">Submit request</button>
                </form>
            </section>
            <section class="panel" id="adminQueue">
                <p class="eyebrow">Admin</p>
                <h2>Pending requests</h2>
                <div class="request-list" id="requestList"></div>
            </section>
        </main>
    </div>
    <script src="script_timeoff.js"></script>
</body>
</html>
